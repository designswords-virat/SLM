  <!-- ════════════════════ BEGIN CLIENT DEMO ════════════════════
       TEMPORARY: on this Industrial sector listing, only the
       "Bright Metal" project card is clickable. All other project
       tiles in the grid have their href stripped. Home / Back to
       Sectors links (index.html and #anchors) work as normal.
       Runs after main.js renders the project grid; setTimeout(0)
       ensures we sweep injected DOM too.
       To restore: delete this entire BEGIN/END block.
  ════════════════════════════════════════════════════════════════ -->
  <script>
    (function () {
      var killPattern = /(tools|journey|leadership|projects|project)\.html/i;
      function isAllowed(href) {
        return /^project\.html\?id=bright-metal(\b|$)/i.test(href)
            || /^projects\.html\?category=Industrial(\b|$)/i.test(href);
      }
      function urlFromOnclick(s) {
        var m = (s || '').match(/['"]([^'"]+\.html[^'"]*)['"]/);
        return m ? m[1] : '';
      }
      function neutralize() {
        document.querySelectorAll('a[href]').forEach(function (a) {
          var href = a.getAttribute('href') || '';
          if (!killPattern.test(href)) return;
          if (isAllowed(href)) return;
          a.removeAttribute('href');
          a.style.cursor = 'default';
          a.addEventListener('click', function (e) { e.preventDefault(); });
        });
        document.querySelectorAll('[onclick]').forEach(function (el) {
          var oc = el.getAttribute('onclick') || '';
          if (!killPattern.test(oc)) return;
          if (isAllowed(urlFromOnclick(oc))) return;
          el.removeAttribute('onclick');
          el.style.cursor = 'default';
        });
      }
      function run() { neutralize(); setTimeout(neutralize, 0); }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', run);
      } else { run(); }
    })();
  </script>
  <!-- ════════════════════ END CLIENT DEMO ══════════════════════ -->
